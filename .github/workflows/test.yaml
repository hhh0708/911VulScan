name: tests
on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python (undefined names, syntax errors)
        working-directory: libs/vulscan-core
        run: ruff check .

  python-tests:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            libs/vulscan-core/requirements.txt
            libs/vulscan-core/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: libs/vulscan-core/parsers/javascript/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: libs/vulscan-core/parsers/go/go_parser/go.mod
          cache-dependency-path: libs/vulscan-core/parsers/go/go_parser/go.mod

      - name: Install Python dependencies
        working-directory: libs/vulscan-core
        run: pip install -r requirements.txt && pip install ".[dev]"

      - name: Cache JS parser node_modules
        id: cache-node-modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: libs/vulscan-core/parsers/javascript/node_modules
          key: ${{ runner.os }}-jsparser-nodemodules-${{ hashFiles('libs/vulscan-core/parsers/javascript/package-lock.json') }}

      - name: Install JS parser dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: libs/vulscan-core/parsers/javascript
        run: npm ci

      - name: Build go_parser binary (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: libs/vulscan-core/parsers/go/go_parser
        run: go build -o go_parser .

      - name: Build go_parser binary (Windows)
        if: runner.os == 'Windows'
        working-directory: libs/vulscan-core/parsers/go/go_parser
        run: go build -o go_parser.exe .

      - name: Run Python and parser tests
        working-directory: libs/vulscan-core
        run: python -m pytest tests/ -v

  go-tests:
    name: Go build + integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      VULSCAN_PYTHON: python
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/vulscan-cli/go.mod
          cache-dependency-path: apps/vulscan-cli/go.sum

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            libs/vulscan-core/requirements.txt
            libs/vulscan-core/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: libs/vulscan-core/parsers/javascript/package-lock.json

      - name: Vet
        working-directory: apps/vulscan-cli
        run: go vet ./...

      - name: Run Go unit tests
        working-directory: apps/vulscan-cli
        run: go test ./... -v

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: apps/vulscan-cli
        run: go build -o bin/vulscan .

      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/vulscan-cli
        run: go build -o bin/vulscan.exe .

      - name: Verify binary exists
        working-directory: apps/vulscan-cli
        shell: bash
        run: |
          if [ -f bin/vulscan ] || [ -f bin/vulscan.exe ]; then
            echo "Binary built successfully"
          else
            echo "ERROR: Binary not found" && exit 1
          fi

      - name: Install Python dependencies
        working-directory: libs/vulscan-core
        run: pip install -r requirements.txt && pip install ".[dev]"

      - name: Cache JS parser node_modules
        id: cache-node-modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: libs/vulscan-core/parsers/javascript/node_modules
          key: ${{ runner.os }}-jsparser-nodemodules-${{ hashFiles('libs/vulscan-core/parsers/javascript/package-lock.json') }}

      - name: Install JS parser dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: libs/vulscan-core/parsers/javascript
        run: npm ci

      - name: Run Go CLI integration tests
        working-directory: libs/vulscan-core
        run: python -m pytest tests/test_go_cli.py -v --tb=short
