name: Phase 12 Acceptance

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  CORE: libs/vulscan-core
  CLI: apps/vulscan-cli

jobs:
  python-unit:
    name: Python unit + FinalScanArtifact E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.CORE }}/requirements.txt
      - name: Install
        working-directory: ${{ env.CORE }}
        run: |
          set -euo pipefail
          pip install -r requirements.txt
          pip install -e ".[dev]" || pip install -e .
          pip install pytest
      - name: Phase 11/12 invariant tests
        working-directory: ${{ env.CORE }}
        run: |
          set -euo pipefail
          python -m pytest \
            tests/test_phase11_final_artifact.py \
            tests/test_phase11_dynamic_identity.py \
            tests/test_phase11_e2e_fixtures.py \
            tests/test_phase12_*.py \
            tests/test_phase10b_dynamic_security.py \
            -q --tb=short

  go-build:
    name: Go CLI build/test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ${{ env.CLI }}/go.mod
      - name: Test & build
        working-directory: ${{ env.CLI }}
        run: |
          set -euo pipefail
          go test ./internal/types/ ./cmd/ -count=1
          go build -o bin/vulscan .

  docker-dynamic-e2e:
    name: Docker dynamic E2E (4 languages)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Skipped tests in this job MUST fail the job.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Python deps
        working-directory: ${{ env.CORE }}
        run: |
          set -euo pipefail
          pip install -r requirements.txt
          pip install -e ".[dev]" || pip install -e .
          pip install pytest
      - name: Pre-pull and pin base images (offline builds)
        id: images
        run: |
          set -euo pipefail
          # Known floating-tag risk: these base images are pulled by mutable tag
          # (not pinned by digest). The recorded digests below only document what
          # was pulled in this run; they do not protect future pulls. Accepted
          # risk for E2E fixtures — pinning by digest would need constant upkeep.
          declare -A IMAGES=(
            [python]="python:3.11-slim"
            [node]="node:20-slim"
            [golang]="golang:1.22-alpine"
            [gcc]="gcc:13"
          )
          mkdir -p artifacts/digests
          for key in "${!IMAGES[@]}"; do
            ref="${IMAGES[$key]}"
            docker pull "$ref"
            digest=$(docker image inspect --format '{{.Id}}' "$ref")
            echo "$ref $digest" | tee "artifacts/digests/${key}.txt"
            echo "${key}_digest=$digest" >> "$GITHUB_OUTPUT"
          done
      - name: Run four-language Docker E2E
        working-directory: ${{ env.CORE }}
        env:
          VULSCAN_REQUIRE_DOCKER_E2E: "1"
        run: |
          set -euo pipefail
          python -m pytest tests/test_phase12_docker_e2e.py -q --tb=short
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-dynamic-e2e-evidence
          path: artifacts/docker-e2e/**
          if-no-files-found: error
